groups:
- name: api-latency
  rules:
  - alert: HighPredictionLatency
    expr: histogram_quantile(
            0.95,
            sum(rate(credit_model_prediction_latency_seconds_bucket[5m])) by (le)
          ) > 0.3
    for: 2m
    labels:
      severity: critical
    annotations:
      summary: "High prediction latency detected"
      description: "p95 latency exceeded 300ms for 2 minutes"
      current_value: "{{ $value }}"