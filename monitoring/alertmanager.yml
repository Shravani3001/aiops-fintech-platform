global:
  resolve_timeout: 5m

route:
  receiver: "aiops-webhook"
  group_by: ["alertname"]
  group_wait: 15s
  group_interval: 15s
  repeat_interval: 5m
  
  routes:
    - matchers:
        - severity="critical"
      receiver: "aiops-webhook"
     
receivers:
  - name: "aiops-webhook"
    webhook_configs:
      - url: "http://api:8000/incident/analyze"
        send_resolved: true

  